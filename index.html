<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Mexo — Shift & Loon Tracker</title>
<meta name="description" content="Houd je shifts, uren en loon bij. Werkschema, payday-countdown en toeslagen.">
<meta name="theme-color" content="#0F1613">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mexo">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;padding:0;height:100%;background:#0F1613;overscroll-behavior:none}
  #root{height:100%}
  @supports not (height:100dvh){#root>div{height:100vh!important;max-height:100vh!important}}
  #root{min-height:100vh}
  #fout{display:none;font-family:monospace;background:#0F1613;color:#fff;padding:16px;font-size:12px;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<noscript><div style="padding:20px;font-family:sans-serif;font-weight:bold;color:#fff">Zet JavaScript aan om Mexo te gebruiken.</div></noscript>
<div id="fout"></div>
<div id="root"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('fout');
  if (el) { el.style.display = 'block';
  el.textContent = 'Er ging iets mis bij het laden:\n' + msg + (err && err.stack ? '\n\n' + err.stack : ''); }
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) { console.log('SW registratie mislukt:', e); });
  });
}
</script>

t het gebruik van de app, waaronder verlies van gegevens, gemiste inkomsten of beslissingen die je op basis van de getoonde bedragen neemt.","Niets in deze voorwaarden beperkt aansprakelijkheid die op grond van dwingend recht niet kan worden uitgesloten."]],["7. Intellectueel eigendom",["De naam Mexo, het logo, het ontwerp en de programmatuur zijn eigendom van de maker. De gegevens die jij invoert blijven van jou."]],["8. Wijziging van deze voorwaarden",["Deze voorwaarden kunnen worden aangepast. De actuele versie staat altijd in de app. Blijf je Mexo gebruiken na een wijziging, dan geldt de nieuwe versie."]],["9. Toepasselijk recht",["Op deze voorwaarden is Nederlands recht van toepassing."]],["10. Contact",["Vragen over deze voorwaarden? Neem contact op via de contactgegevens bij de app-vermelding in de store."]]],vh=[["Kort samengevat",["Mexo verzamelt geen gegevens over jou. Alles wat je invoert blijft op je eigen toestel staan. Er is geen server, geen account in de cloud, geen tracking en geen advertenties."]],["1. Welke gegevens slaat de app op?",["Op je toestel worden opgeslagen: je profielnaam, een eventuele profielfoto, een versleutelde (gehashte) pincode, je ingevoerde diensten en werkschema, je baan-profielen en je instellingen zoals loon, toeslagen en thema.","Deze gegevens staan in de lokale opslag van de app of browser op je toestel en worden nergens naartoe verzonden."]],["2. Wat gebeurt er niet?",["Er worden geen gegevens naar een server van de maker of naar derden gestuurd. Er wordt geen gebruik gemaakt van analytics, advertenties, profilering of locatiebepaling. Er worden geen gegevens verkocht of gedeeld."]],["3. Profielfoto",["Kies je een profielfoto, dan wordt die verkleind en alleen op je eigen toestel bewaard. De app krijgt geen toegang tot je overige foto's en uploadt niets."]],["4. Meldingen",["Als je meldingen toestaat, worden die lokaal door je toestel gemaakt wanneer je de app opent. Er is geen pushserver en er wordt geen apparaat-identif
