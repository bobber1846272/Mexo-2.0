<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Mexo — Shift & Loon Tracker</title>
<meta name="description" content="Houd je shifts, uren en loon bij. Werkschema, payday-countdown en toeslagen.">
<meta name="theme-color" content="#0F1613">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mexo">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;padding:0;background:#0F1613;overscroll-behavior:none}
  #root{min-height:100vh}
  #fout{display:none;font-family:monospace;background:#0F1613;color:#fff;padding:16px;font-size:12px;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<noscript><div style="padding:20px;font-family:sans-serif;font-weight:bold;color:#fff">Zet JavaScript aan om Mexo te gebruiken.</div></noscript>
<div id="fout"></div>
<div id="root"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('fout');
  if (el) { el.style.display = 'block';
  el.textContent = 'Er ging iets mis bij het laden:\n' + msg + (err && err.stack ? '\n\n' + err.stack : ''); }
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) { console.log('SW registratie mislukt:', e); });
  });
}
</script>
