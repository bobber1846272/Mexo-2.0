<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Mexo — Shift & Loon Tracker</title>
<meta name="description" content="Houd je shifts, uren en loon bij. Werkschema, payday-countdown en toeslagen.">
<meta name="theme-color" content="#0F1613">

<!-- ─────────────────────────────────────────────────────────────
     Beveiliging: de app mag alleen praten met zichzelf en met
     Supabase. Wordt er ooit vreemde code binnengesmokkeld, dan
     kan die geen gegevens naar buiten sturen.
     Pas connect-src aan als je van cloudleverancier wisselt.
     ───────────────────────────────────────────────────────────── -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  font-src 'self';
  connect-src 'self' https://*.supabase.co;
  form-action 'none';
  frame-ancestors 'none';
  base-uri 'self';
  object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mexo">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;padding:0;height:100%;background:#0F1613;overscroll-behavior:none}
  #root{height:100%}
  @supports not (height:100dvh){#root>div{height:100vh!important;max-height:100vh!important}}
  #root{min-height:100vh}
  #fout{display:none;font-family:monospace;background:#0F1613;color:#fff;padding:16px;font-size:12px;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<noscript><div style="padding:20px;font-family:sans-serif;font-weight:bold;color:#fff">Zet JavaScript aan om Mexo te gebruiken.</div></noscript>
<div id="fout"></div>
<div id="root"></div>
<!-- Jouw eigen instellingen; dit bestand hoef je nooit te vervangen -->
<script>window.MEXO_CLOUD = { url: "", key: "" };</script>
<script src="config.js"></script>
</script>
</script>
</script>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('fout');
  if (el) { el.style.display = 'block';
  el.textContent = 'Er ging iets mis bij het laden:\n' + msg + (err && err.stack ? '\n\n' + err.stack : ''); }
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) { console.log('SW registratie mislukt:', e); });
  });
}
</script>

,Ty="10.1",Na={versie:"9.9",emoji:"\u{1F680}",titel:"Mexo is bijgewerkt!",intro:"Er zijn nieuwe functies bijgekomen en een paar dingen zijn verbeterd.",punten:["Loonsverhoging gehad? Geef de datum door bij Loon \u2014 je oude periodes blijven kloppen","Nieuw? Mexo helpt je in vier stappen op weg met jouw eigen loon","Je betaaldag is zelf in te stellen \u2014 check hem onder Loonperiode","Inloggen kan nu ook met Enter, en je pincode is beter beveiligd"]},nu=3,au=10,Ay=[{titel:"Account",items:[{key:"cloud",icoon:"\u2601\uFE0F",label:"Account & synchronisatie"},{key:"profiel",icoon:"\u{1F464}",label:"Mijn profiel"}]},{titel:"Werk",items:[{key:"banen",icoon:"\u{1F4BC}",label:"Mijn banen"},{key:"periode",icoon:"\u{1F4C6}",label:"Loonperiode"},{key:"loon",icoon:"\u{1F4B6}",label:"Loon"},{key:"toeslagen",icoon:"\u2B50",label:"Toeslagen"}]},{titel:"App",items:[{key:"thema",icoon:"\u{1F3A8}",label:"Thema"},{key:"taal",icoon:"\u{1F310}",label:"Taal"},{key:"feedback",icoon:"\u{1F4AC}",label:"Feedback sturen"},{key:"herinneringen",icoon:"\u{1F514}",label:"Herinneringen"}]},{titel:"Gegevens",items:[{key:"voorwaarden",icoon:"\u{1F4C4}",label:"Algemene voorwaarden"},{key:"privacy",icoon:"\u{1F512}",label:"Privacyverklaring"},{key:"backup",icoon:"\u{1F4BE}",label:"Backup & wissen"}]},{titel:"Beheer",items:[{key:"beheer",icoon:"\u{1F4E3}",label:"Meldingen versturen",alleenBeheer:!0},{key:"inbox",icoon:"\u{1F4E5}",label:"Feedback-inbox",alleenBeheer:!0},{key:"cijfers",icoon:"\u{1F4C8}",label:"Cijfers",alleenBeheer:!0},{key:"beheerders",icoon:"\u{1F451}",label:"Beheerders",alleenBeheer:!0},{key:"onderhoud",icoon:"\u{1F6A7}",label:"Onderhoudsmodus",alleenBeheer:!0},{key:"fouten",icoon:"\u{1F41E}",label:"Foutmeldingen",alleenBeheer:!0}]},{titel:"Gevarenzone",items:[{key:"gevaar",icoon:"\u26A0\uFE0F",label:"Account verwijderen"}]}],qk="22 juli 2026",Xk=[["1. Over deze voorwaarden",["Deze algemene voorwaarden gelden voor het gebruik van de app Mexo. Door Mexo te installeren of te gebruiken ga je akkoord met deze voorwaarden. Ben je het er niet mee eens, gebruik de app dan niet."]],["2. De app",["Mexo is een hulpmiddel waarmee je zelf je gewerkte diensten, uren en werkschema bijhoudt en een schatting van je brutoloon berekent. Mexo is geen loonadministratie, geen boekhoudprogramma en geen financieel of juridisch advies.","Mexo staat los van je werkgever. De app is niet verbonden aan, en wordt niet ondersteund door, welke werkgever, supermarkt, vervoerder of andere organisatie dan ook."]],["3. Berekeningen zijn een schatting",["Alle bedragen in de app zijn indicatief en gebaseerd op de gegevens en instellingen die jij zelf invoert (uurloon, toeslagen, periodes en dergelijke).","Je kunt aan de uitkomsten geen rechten ontlenen. Bij verschil is altijd je offici\xEBle loonstrook of de opgave van je werkgever leidend. Controleer belangrijke bedragen dus zelf."]],["4. Je account",["Mexo is te gebruiken met een account of als beperkte demoversie zonder account. Voor een account heb je een geldig e-mailadres nodig.","Je bent zelf verantwoordelijk voor het geheimhouden van je wachtwoord. Deel je inloggegevens met niemand en gebruik een wachtwoord dat je nergens anders gebruikt.","Vermoed je dat iemand anders bij je account kan? Wijzig dan direct je wachtwoord via Instellingen \u2192 Mijn profiel.","Je mag je account op elk moment verwijderen via Instellingen \u2192 Gevarenzone. Je gegevens worden dan definitief gewist.","Accounts die worden misbruikt of gebruikt voor onrechtmatige doeleinden kunnen worden geblokkeerd of verwijderd."]],["5. Synchronisatie",["Met een account worden je gegevens opgeslagen op een server en gesynchroniseerd tussen je apparaten. Daarvoor is een internetverbinding nodig; zonder verbinding werkt de app door met de gegevens op je toestel.","Pas je op twee apparaten tegelijk iets aan zonder verbinding, dan kunnen er twee versies ontstaan. Mexo laat je in dat geval kiezen welke versie behouden blijft; de andere wordt overschreven.","We doen ons best de dienst beschikbaar te houden, maar kunnen geen ononderbroken beschikbaarheid garanderen. Maak daarom regelmatig een back-up via Instellingen \u2192 Backup."]],["6. Jouw verantwoordelijkheid",["Je bent zelf verantwoordelijk voor de juistheid van wat je invoert en voor het maken van back-ups van je gegevens (Instellingen \u2192 Backup).","Je gebruikt de app niet voor onrechtmatige doeleinden en probeert de app niet te misbruiken, na te maken of te verstoren."]],["7. Beschikbaarheid en wijzigingen",["Mexo wordt aangeboden zoals hij is, zonder garantie op ononderbroken beschikbaarheid of foutloze werking.","Functies kunnen worden toegevoegd, gewijzigd of verwijderd. De app kan ook worden stopgezet; maak daarom regelmatig een back-up van je gegevens."]],["8. Aansprakelijkheid",["Voor zover wettelijk toegestaan is de maker van Mexo niet aansprakelijk voor schade die voortvloeit uit het gebruik van de app, waaronder verlies van gegevens, gemiste inkomsten of beslissingen die je op basis van de getoonde bedragen neemt.","Niets in deze voorwaarden beperkt aansprakelijkheid die op grond van dwingend recht niet kan worden uitgesloten."]],["9. Intellectueel eigendom",["De naam Mexo, het logo, het ontwerp en de programmatuur zijn eigendom van de maker. De gegevens die jij invoert blijven van jou."]],["10. Wijziging van deze voorwaarden",["Deze voorwaarden kunnen worden aangepast. De actuele versie staat altijd in de app. Blijf je Mexo gebruiken na een wijziging, dan geldt de nieuwe versie."]],["11. Toepasselijk recht",["Op deze voorwaarden is Nederlands recht van toepassing."]],["12. Contact",["Vragen over deze voorwaarden? Mail naar support.tspcode@gmail.com."]]],Qk=[["Kort samengevat",["Mexo verkoopt niets, volgt je niet en toont geen advertenties. Zonder account blijft alles op je eigen toestel. Kies je voor een account, dan worden je gegevens opgeslagen op een beveiligde server in Europa, zodat je ze op meerdere apparaten kunt gebruiken."]],["1. Twee manieren om Mexo te gebruiken",["Demoversie (zonder account): alles blijft in de opslag van je eigen toestel. Er wordt niets verzonden.","Met een account: je gegevens worden opgeslagen bij onze dienstverlener en gesynchroniseerd tussen je apparaten."]],["2. Welke gegevens worden opgeslagen?",["Accountgegevens: je e-mailadres en een versleutelde weergave van je wachtwoord. Je wachtwoord zelf is voor niemand leesbaar, ook niet voor ons.","Profielgegevens: je naam, een eventuele profielfoto en een versleutelde (gehashte) pincode.","Werkgegevens: je ingevoerde diensten, je werkschema, je baan-profielen en je instellingen zoals uurloon, toeslagen, taal en thema.","Meer wordt er niet opgeslagen. Er zijn geen trackers, geen advertentienetwerken en geen analysesoftware."]],["3. Waar staan je gegevens?",["Voor accounts en opslag gebruiken we Supabase. De gegevens staan op servers binnen de Europese Unie (Frankfurt, Duitsland).","De opslag is beveiligd met toegangsregels waardoor je uitsluitend bij je eigen gegevens kunt. Andere gebruikers kunnen jouw gegevens niet inzien.","Ook op je eigen toestel blijft een kopie staan, zodat de app werkt zonder internetverbinding."]],["4. Wat gebeurt er niet?",["Je gegevens worden niet verkocht, verhuurd of gedeeld met adverteerders.","Er wordt geen profiel van je opgebouwd voor reclamedoeleinden.","Je locatie, contacten, agenda en andere apps worden niet uitgelezen.","Mexo stuurt geen gegevens naar je werkgever."]],["5. Waarvoor gebruiken we je gegevens?",["Uitsluitend om de app te laten werken: je diensten bewaren, je loon berekenen en je gegevens tussen je apparaten synchroniseren.","Je e-mailadres wordt alleen gebruikt om in te loggen, om je wachtwoord te kunnen herstellen en om je te waarschuwen bij belangrijke wijzigingen aan je account.","Er worden geen reclamemails verstuurd."]],["6. Hoe lang bewaren we je gegevens?",["Zolang je account bestaat. Verwijder je je account in de app, dan worden je gegevens en je inlog direct van de server gewist.","Die verwijdering is definitief; er wordt geen kopie bewaard."]],["7. Je rechten",["Je kunt je gegevens op elk moment inzien in de app zelf, aanpassen, exporteren via de backupfunctie, en volledig verwijderen via Instellingen \u2192 Gevarenzone.","Je kunt je e-mailadres en wachtwoord wijzigen via Instellingen \u2192 Mijn profiel.","Heb je een vraag over je gegevens, neem dan contact op via het adres onderaan deze verklaring."]],["8. Beveiliging",["Verbindingen verlopen versleuteld (https). Wachtwoorden worden versleuteld opgeslagen en zijn niet terug te lezen.","Toegang tot je gegevens is technisch beperkt tot je eigen account.","Geen enkel systeem is volledig onfeilbaar. Gebruik daarom een uniek wachtwoord dat je nergens anders gebruikt."]],["9. Kinderen",["Mexo is bedoeld voor mensen die werken. Ben je jonger dan 16, gebruik de app dan met toestemming van een ouder of verzorger."]],["10. Berekeningen zijn schattingen",["De bedragen in Mexo zijn schattingen op basis van wat jij invult. Ze houden geen rekening met belastingen, premies en inhoudingen. Je loonstrook van je werkgever is altijd leidend."]],["11. Wijzigingen",["Verandert er iets aan deze verklaring, dan wordt dat in de app gemeld. De datum onderaan geeft aan wanneer de tekst voor het laatst is bijgewerkt."]],["12. Contact",["Vragen over je privacy of je gegevens? Mail naar support.tspcode@gmail.com."]]],Fk={en:[["In short",["Mexo sells nothing, does not track you and shows no adverts. Without an account everything stays on your own device. Choose an account and your data is stored on a secure server in Europe so you can use it on several devices."]],["1. Two ways to use Mexo",["Demo version (no account): everything stays in your own device's storage. Nothing is sent anywhere.","With an account: your data is stored with our service provider and synchronised between your devices."]],["2. What data is stored?",["Account details: your email address and an encrypted representation of your password. Your password itself is readable by nobody, not even us.","Profile details: your name, an optional profile picture and an encrypted (hashed) PIN.","Work data: the shifts you enter, your work schedule, your job profiles and your settings such as hourly rate, supplements, language and theme.","Nothing beyond this is stored. There are no trackers, no advertising networks and no analytics software."]],["3. Where is your data kept?",["For accounts and storage we use Supabase. The data sits on servers within the European Union (Frankfurt, Germany).","Storage is protected by access rules that let you reach only your own data. Other users cannot see yours.","A copy also stays on your own device so the app works without an internet connection."]],["4. What does not happen",["Your data is not sold, rented out or shared with advertisers.","No profile of you is built for advertising purposes.","Your location, contacts, calendar and other apps are not read.","Mexo sends no data to your employer."]],["5. What do we use your data for?",["Purely to make the app work: storing your shifts, calculating your pay and synchronising your data between your devices.","Your email address is used only to log in, to let you reset your password and to warn you about important changes to your account.","No marketing emails are sent."]],["6. How long do we keep your data?",["For as long as your account exists. Delete your account in the app and your data and login are wiped from the server immediately.","That deletion is permanent; no copy is kept."]],["7. Your rights",["You can view your data at any time in the app itself, change it, export it through the backup function, and delete it entirely through Settings, Danger zone.","You can change your email address and password through Settings, My profile.","If you have a question about your data, get in touch using the address at the bottom of this statement."]],["8. Security",["Connections are encrypted (https). Passwords are stored encrypted and cannot be read back.","Access to your data is technically limited to your own account.","No system is completely infallible. Use a unique password that you use nowhere else."]],["9. Children",["Mexo is meant for people who work. If you are under 16, use the app with permission from a parent or guardian."]],["10. Calculations are estimates",["The amounts in Mexo are estimates based on what you enter. They do not account for taxes, contributions and deductions. Your employer's payslip is always leading."]],["11. Changes",["If anything about this statement changes, it will be announced in the app. The date at the bottom shows when the text was last updated."]],["12. Contact",["Questions about your privacy or your data? Email support.tspcode@gmail.com."]]],pl:[["W skr\xF3cie",["Mexo niczego nie sprzedaje, nie \u015Bledzi Ci\u0119 i nie pokazuje reklam. Bez konta wszystko zostaje na Twoim urz\u0105dzeniu. Gdy wybierzesz konto, dane s\u0105 przechowywane na bezpiecznym serwerze w Europie, dzi\u0119ki czemu mo\u017Cesz korzysta\u0107 z nich na kilku urz\u0105dzeniach."]],["1. Dwa sposoby korzystania z Mexo",["Wersja demo (bez konta): wszystko zostaje w pami\u0119ci Twojego urz\u0105dzenia. Nic nie jest wysy\u0142ane.","Z kontem: Twoje dane s\u0105 przechowywane u naszego dostawcy us\u0142ug i synchronizowane mi\u0119dzy urz\u0105dzeniami."]],["2. Jakie dane s\u0105 przechowywane?",["Dane konta: adres e-mail i zaszyfrowana posta\u0107 has\u0142a. Samego has\u0142a nikt nie mo\u017Ce odczyta\u0107, my r\xF3wnie\u017C nie.","Dane profilu: imi\u0119, opcjonalne zdj\u0119cie profilowe i zaszyfrowany (zahaszowany) PIN.","Dane pracy: wprowadzone zmiany, grafik, profile pracy oraz ustawienia takie jak stawka godzinowa, dodatki, j\u0119zyk i motyw.","Nic ponad to nie jest zapisywane. Nie ma tracker\xF3w, sieci reklamowych ani oprogramowania analitycznego."]],["3. Gdzie s\u0105 Twoje dane?",["Do obs\u0142ugi kont i przechowywania u\u017Cywamy Supabase. Dane znajduj\u0105 si\u0119 na serwerach w Unii Europejskiej (Frankfurt, Niemcy).","Przechowywanie jest zabezpieczone regu\u0142ami dost\u0119pu, dzi\u0119ki kt\xF3rym docierasz wy\u0142\u0105cznie do w\u0142asnych danych. Inni u\u017Cytkownicy nie widz\u0105 Twoich.","Kopia zostaje te\u017C na Twoim urz\u0105dzeniu, aby aplikacja dzia\u0142a\u0142a bez internetu."]],["4. Czego nie robimy",["Twoje dane nie s\u0105 sprzedawane, wynajmowane ani udost\u0119pniane reklamodawcom.","Nie budujemy Twojego profilu do cel\xF3w reklamowych.","Nie odczytujemy Twojej lokalizacji, kontakt\xF3w, kalendarza ani innych aplikacji.","Mexo nie wysy\u0142a \u017Cadnych danych do Twojego pracodawcy."]],["5. Do czego u\u017Cywamy Twoich danych?",["Wy\u0142\u0105cznie po to, by aplikacja dzia\u0142a\u0142a: przechowywanie zmian, obliczanie wyp\u0142aty i synchronizacja danych mi\u0119dzy urz\u0105dzeniami.","Adres e-mail s\u0142u\u017Cy tylko do logowania, resetowania has\u0142a i powiadamiania o wa\u017Cnych zmianach na koncie.","Nie wysy\u0142amy maili reklamowych."]],["6. Jak d\u0142ugo przechowujemy dane?",["Tak d\u0142ugo, jak istnieje Twoje konto. Gdy usuniesz konto w aplikacji, dane i dost\u0119p s\u0105 natychmiast kasowane z serwera.","Usuni\u0119cie jest ostateczne; nie zachowujemy kopii."]],["7. Twoje prawa",["W ka\u017Cdej chwili mo\u017Cesz przejrze\u0107 swoje dane w aplikacji, zmieni\u0107 je, wyeksportowa\u0107 przez funkcj\u0119 kopii zapasowej i ca\u0142kowicie usun\u0105\u0107 w Ustawieniach, w strefie zagro\u017Cenia.","Adres e-mail i has\u0142o zmienisz w Ustawieniach, w Moim profilu.","Masz pytanie o swoje dane? Napisz na adres podany na dole tego dokumentu."]],["8. Bezpiecze\u0144stwo",["Po\u0142\u0105czenia s\u0105 szyfrowane (https). Has\u0142a s\u0105 przechowywane w postaci zaszyfrowanej i nie da si\u0119 ich odczyta\u0107.","Dost\u0119p do Twoich danych jest technicznie ograniczony do Twojego konta.","\u017Baden system nie jest w pe\u0142ni niezawodny. U\u017Cywaj unikalnego has\u0142a, kt\xF3rego nie stosujesz nigdzie indziej."]],["9. Dzieci",["Mexo jest przeznaczone dla os\xF3b pracuj\u0105cych. Je\u015Bli masz mniej ni\u017C 16 lat, korzystaj z aplikacji za zgod\u0105 rodzica lub opiekuna."]],["10. Obliczenia s\u0105 szacunkowe",["Kwoty w Mexo s\u0105 szacunkami na podstawie tego, co wpiszesz. Nie uwzgl\u0119dniaj\u0105 podatk\xF3w, sk\u0142adek ani potr\u0105ce\u0144. Zawsze decyduj\u0105cy jest pasek wyp\u0142aty od pracodawcy."]],["11. Zmiany",["Je\u015Bli co\u015B w tym dokumencie si\u0119 zmieni, poinformujemy o tym w aplikacji. Data na dole wskazuje ostatni\u0105 aktualizacj\u0119."]],["12. Kontakt",["Pytania o prywatno\u015B\u0107 lub dane? Napisz na support.tspcode@gmail.com."]]],bg:[["\u041D\u0430\u043A\u0440\u0430\u0442\u043A\u043E",["Mexo \u043D\u0435 \u043F\u0440\u043E\u0434\u0430\u0432\u0430 \u043D\u0438\u0449\u043E, \u043D\u0435 \u0442\u0435 \u0441\u043B\u0435\u0434\u0438 \u0438 \u043D\u0435 \u043F\u043E\u043A\u0430\u0437\u0432\u0430 \u0440\u0435\u043A\u043B\u0430\u043C\u0438. \u0411\u0435\u0437 \u043F\u0440\u043E\u0444\u0438\u043B \u0432\u0441\u0438\u0447\u043A\u043E \u043E\u0441\u0442\u0430\u0432\u0430 \u043D\u0430 \u0442\u0432\u043E\u0435\u0442\u043E \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E. \u0410\u043A\u043E \u0438\u0437\u0431\u0435\u0440\u0435\u0448 \u043F\u0440\u043E\u0444\u0438\u043B, \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0441\u0435 \u043F\u0430\u0437\u044F\u0442 \u043D\u0430 \u0437\u0430\u0449\u0438\u0442\u0435\u043D \u0441\u044A\u0440\u0432\u044A\u0440 \u0432 \u0415\u0432\u0440\u043E\u043F\u0430, \u0437\u0430 \u0434\u0430 \u0433\u0438 \u043F\u043E\u043B\u0437\u0432\u0430\u0448 \u043D\u0430 \u043D\u044F\u043A\u043E\u043B\u043A\u043E \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430."]],["1. \u0414\u0432\u0430 \u043D\u0430\u0447\u0438\u043D\u0430 \u0434\u0430 \u043F\u043E\u043B\u0437\u0432\u0430\u0448 Mexo",["\u0414\u0435\u043C\u043E \u0432\u0435\u0440\u0441\u0438\u044F (\u0431\u0435\u0437 \u043F\u0440\u043E\u0444\u0438\u043B): \u0432\u0441\u0438\u0447\u043A\u043E \u043E\u0441\u0442\u0430\u0432\u0430 \u0432 \u043F\u0430\u043C\u0435\u0442\u0442\u0430 \u043D\u0430 \u0442\u0432\u043E\u0435\u0442\u043E \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E. \u041D\u0438\u0449\u043E \u043D\u0435 \u0441\u0435 \u0438\u0437\u043F\u0440\u0430\u0449\u0430.","\u0421 \u043F\u0440\u043E\u0444\u0438\u043B: \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438 \u0441\u0435 \u0441\u044A\u0445\u0440\u0430\u043D\u044F\u0432\u0430\u0442 \u043F\u0440\u0438 \u043D\u0430\u0448\u0438\u044F \u0434\u043E\u0441\u0442\u0430\u0432\u0447\u0438\u043A \u043D\u0430 \u0443\u0441\u043B\u0443\u0433\u0438 \u0438 \u0441\u0435 \u0441\u0438\u043D\u0445\u0440\u043E\u043D\u0438\u0437\u0438\u0440\u0430\u0442 \u043C\u0435\u0436\u0434\u0443 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430\u0442\u0430 \u0442\u0438."]],["2. \u041A\u0430\u043A\u0432\u0438 \u0434\u0430\u043D\u043D\u0438 \u0441\u0435 \u0441\u044A\u0445\u0440\u0430\u043D\u044F\u0432\u0430\u0442?",["\u0414\u0430\u043D\u043D\u0438 \u0437\u0430 \u043F\u0440\u043E\u0444\u0438\u043B\u0430: \u0438\u043C\u0435\u0439\u043B \u0430\u0434\u0440\u0435\u0441\u044A\u0442 \u0442\u0438 \u0438 \u043A\u0440\u0438\u043F\u0442\u0438\u0440\u0430\u043D \u0432\u0438\u0434 \u043D\u0430 \u043F\u0430\u0440\u043E\u043B\u0430\u0442\u0430. \u0421\u0430\u043C\u0430\u0442\u0430 \u043F\u0430\u0440\u043E\u043B\u0430 \u043D\u0435 \u0435 \u0447\u0435\u0442\u0438\u043C\u0430 \u0437\u0430 \u043D\u0438\u043A\u043E\u0433\u043E, \u0432\u043A\u043B\u044E\u0447\u0438\u0442\u0435\u043B\u043D\u043E \u0437\u0430 \u043D\u0430\u0441.","\u0414\u0430\u043D\u043D\u0438 \u0437\u0430 \u043F\u0440\u043E\u0444\u0438\u043B\u0430 \u0442\u0438: \u0438\u043C\u0435, \u043F\u043E \u0438\u0437\u0431\u043E\u0440 \u0441\u043D\u0438\u043C\u043A\u0430 \u0438 \u043A\u0440\u0438\u043F\u0442\u0438\u0440\u0430\u043D (\u0445\u0435\u0448\u0438\u0440\u0430\u043D) \u041F\u0418\u041D.","\u0420\u0430\u0431\u043E\u0442\u043D\u0438 \u0434\u0430\u043D\u043D\u0438: \u0432\u044A\u0432\u0435\u0434\u0435\u043D\u0438\u0442\u0435 \u0441\u043C\u0435\u043D\u0438, \u0440\u0430\u0431\u043E\u0442\u043D\u0438\u044F\u0442 \u0442\u0438 \u0433\u0440\u0430\u0444\u0438\u043A, \u043F\u0440\u043E\u0444\u0438\u043B\u0438\u0442\u0435 \u043D\u0430 \u0440\u0430\u0431\u043E\u0442\u043D\u0438\u0442\u0435 \u0442\u0438 \u043C\u0435\u0441\u0442\u0430 \u0438 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438\u0442\u0435 \u043A\u0430\u0442\u043E \u0447\u0430\u0441\u043E\u0432\u0430 \u0441\u0442\u0430\u0432\u043A\u0430, \u0434\u043E\u0431\u0430\u0432\u043A\u0438, \u0435\u0437\u0438\u043A \u0438 \u0442\u0435\u043C\u0430.","\u041D\u0438\u0449\u043E \u043F\u043E\u0432\u0435\u0447\u0435 \u043D\u0435 \u0441\u0435 \u0437\u0430\u043F\u0438\u0441\u0432\u0430. \u041D\u044F\u043C\u0430 \u0442\u0440\u0430\u043A\u0435\u0440\u0438, \u043D\u044F\u043C\u0430 \u0440\u0435\u043A\u043B\u0430\u043C\u043D\u0438 \u043C\u0440\u0435\u0436\u0438 \u0438 \u043D\u044F\u043C\u0430 \u0430\u043D\u0430\u043B\u0438\u0442\u0438\u0447\u0435\u043D \u0441\u043E\u0444\u0442\u0443\u0435\u0440."]],["3. \u041A\u044A\u0434\u0435 \u0441\u0430 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438?",["\u0417\u0430 \u043F\u0440\u043E\u0444\u0438\u043B\u0438 \u0438 \u0441\u044A\u0445\u0440\u0430\u043D\u0435\u043D\u0438\u0435 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u043C\u0435 Supabase. \u0414\u0430\u043D\u043D\u0438\u0442\u0435 \u0441\u0430 \u043D\u0430 \u0441\u044A\u0440\u0432\u044A\u0440\u0438 \u0432 \u0415\u0432\u0440\u043E\u043F\u0435\u0439\u0441\u043A\u0438\u044F \u0441\u044A\u044E\u0437 (\u0424\u0440\u0430\u043D\u043A\u0444\u0443\u0440\u0442, \u0413\u0435\u0440\u043C\u0430\u043D\u0438\u044F).","\u0421\u044A\u0445\u0440\u0430\u043D\u0435\u043D\u0438\u0435\u0442\u043E \u0435 \u0437\u0430\u0449\u0438\u0442\u0435\u043D\u043E \u0441 \u043F\u0440\u0430\u0432\u0438\u043B\u0430 \u0437\u0430 \u0434\u043E\u0441\u0442\u044A\u043F, \u0442\u0430\u043A\u0430 \u0447\u0435 \u0441\u0442\u0438\u0433\u0430\u0448 \u0441\u0430\u043C\u043E \u0434\u043E \u0441\u043E\u0431\u0441\u0442\u0432\u0435\u043D\u0438\u0442\u0435 \u0441\u0438 \u0434\u0430\u043D\u043D\u0438. \u0414\u0440\u0443\u0433\u0438 \u043F\u043E\u0442\u0440\u0435\u0431\u0438\u0442\u0435\u043B\u0438 \u043D\u0435 \u0432\u0438\u0436\u0434\u0430\u0442 \u0442\u0432\u043E\u0438\u0442\u0435.","\u041A\u043E\u043F\u0438\u0435 \u043E\u0441\u0442\u0430\u0432\u0430 \u0438 \u043D\u0430 \u0442\u0432\u043E\u0435\u0442\u043E \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E, \u0437\u0430 \u0434\u0430 \u0440\u0430\u0431\u043E\u0442\u0438 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u0431\u0435\u0437 \u0438\u043D\u0442\u0435\u0440\u043D\u0435\u0442."]],["4. \u041A\u0430\u043A\u0432\u043E \u043D\u0435 \u0441\u0435 \u0441\u043B\u0443\u0447\u0432\u0430",["\u0414\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438 \u043D\u0435 \u0441\u0435 \u043F\u0440\u043E\u0434\u0430\u0432\u0430\u0442, \u043D\u0435 \u0441\u0435 \u0434\u0430\u0432\u0430\u0442 \u043F\u043E\u0434 \u043D\u0430\u0435\u043C \u0438 \u043D\u0435 \u0441\u0435 \u0441\u043F\u043E\u0434\u0435\u043B\u044F\u0442 \u0441 \u0440\u0435\u043A\u043B\u0430\u043C\u043E\u0434\u0430\u0442\u0435\u043B\u0438.","\u041D\u0435 \u0441\u0435 \u0438\u0437\u0433\u0440\u0430\u0436\u0434\u0430 \u0442\u0432\u043E\u0439 \u043F\u0440\u043E\u0444\u0438\u043B \u0437\u0430 \u0440\u0435\u043A\u043B\u0430\u043C\u043D\u0438 \u0446\u0435\u043B\u0438.","\u041D\u0435 \u0441\u0435 \u0447\u0435\u0442\u0430\u0442 \u043C\u0435\u0441\u0442\u043E\u043F\u043E\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u0442\u0438, \u043A\u043E\u043D\u0442\u0430\u043A\u0442\u0438\u0442\u0435, \u043A\u0430\u043B\u0435\u043D\u0434\u0430\u0440\u044A\u0442 \u0438\u043B\u0438 \u0434\u0440\u0443\u0433\u0438 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F.","Mexo \u043D\u0435 \u0438\u0437\u043F\u0440\u0430\u0449\u0430 \u0434\u0430\u043D\u043D\u0438 \u043D\u0430 \u0440\u0430\u0431\u043E\u0442\u043E\u0434\u0430\u0442\u0435\u043B\u044F \u0442\u0438."]],["5. \u0417\u0430 \u043A\u0430\u043A\u0432\u043E \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u043C\u0435 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438?",["\u0415\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043E \u0437\u0430 \u0434\u0430 \u0440\u0430\u0431\u043E\u0442\u0438 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E: \u0434\u0430 \u043F\u0430\u0437\u0438 \u0441\u043C\u0435\u043D\u0438\u0442\u0435 \u0442\u0438, \u0434\u0430 \u0441\u043C\u044F\u0442\u0430 \u0437\u0430\u043F\u043B\u0430\u0442\u0430\u0442\u0430 \u0442\u0438 \u0438 \u0434\u0430 \u0441\u0438\u043D\u0445\u0440\u043E\u043D\u0438\u0437\u0438\u0440\u0430 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u043C\u0435\u0436\u0434\u0443 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430\u0442\u0430 \u0442\u0438.","\u0418\u043C\u0435\u0439\u043B\u044A\u0442 \u0442\u0438 \u0441\u0435 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430 \u0441\u0430\u043C\u043E \u0437\u0430 \u0432\u0445\u043E\u0434, \u0437\u0430 \u0432\u044A\u0437\u0441\u0442\u0430\u043D\u043E\u0432\u044F\u0432\u0430\u043D\u0435 \u043D\u0430 \u043F\u0430\u0440\u043E\u043B\u0430 \u0438 \u0437\u0430 \u043F\u0440\u0435\u0434\u0443\u043F\u0440\u0435\u0436\u0434\u0435\u043D\u0438\u0435 \u043F\u0440\u0438 \u0432\u0430\u0436\u043D\u0438 \u043F\u0440\u043E\u043C\u0435\u043D\u0438 \u043F\u043E \u043F\u0440\u043E\u0444\u0438\u043B\u0430 \u0442\u0438.","\u041D\u0435 \u0438\u0437\u043F\u0440\u0430\u0449\u0430\u043C\u0435 \u0440\u0435\u043A\u043B\u0430\u043C\u043D\u0438 \u043F\u0438\u0441\u043C\u0430."]],["6. \u041A\u043E\u043B\u043A\u043E \u0434\u044A\u043B\u0433\u043E \u043F\u0430\u0437\u0438\u043C \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438?",["\u0414\u043E\u043A\u0430\u0442\u043E \u043F\u0440\u043E\u0444\u0438\u043B\u044A\u0442 \u0442\u0438 \u0441\u044A\u0449\u0435\u0441\u0442\u0432\u0443\u0432\u0430. \u0418\u0437\u0442\u0440\u0438\u0435\u0448 \u043B\u0438 \u043F\u0440\u043E\u0444\u0438\u043B\u0430 \u0441\u0438 \u0432 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E, \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0438 \u0434\u043E\u0441\u0442\u044A\u043F\u044A\u0442 \u0441\u0435 \u0437\u0430\u043B\u0438\u0447\u0430\u0432\u0430\u0442 \u043E\u0442 \u0441\u044A\u0440\u0432\u044A\u0440\u0430 \u0432\u0435\u0434\u043D\u0430\u0433\u0430.","\u0418\u0437\u0442\u0440\u0438\u0432\u0430\u043D\u0435\u0442\u043E \u0435 \u043E\u043A\u043E\u043D\u0447\u0430\u0442\u0435\u043B\u043D\u043E; \u043D\u0435 \u0441\u0435 \u043F\u0430\u0437\u0438 \u043A\u043E\u043F\u0438\u0435."]],["7. \u0422\u0432\u043E\u0438\u0442\u0435 \u043F\u0440\u0430\u0432\u0430",["\u041F\u043E \u0432\u0441\u044F\u043A\u043E \u0432\u0440\u0435\u043C\u0435 \u043C\u043E\u0436\u0435\u0448 \u0434\u0430 \u0432\u0438\u0434\u0438\u0448 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0441\u0438 \u0432 \u0441\u0430\u043C\u043E\u0442\u043E \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435, \u0434\u0430 \u0433\u0438 \u043F\u0440\u043E\u043C\u0435\u043D\u0438\u0448, \u0434\u0430 \u0433\u0438 \u0438\u0437\u043D\u0435\u0441\u0435\u0448 \u0447\u0440\u0435\u0437 \u0444\u0443\u043D\u043A\u0446\u0438\u044F\u0442\u0430 \u0437\u0430 \u0440\u0435\u0437\u0435\u0440\u0432\u043D\u043E \u043A\u043E\u043F\u0438\u0435 \u0438 \u0434\u0430 \u0433\u0438 \u0438\u0437\u0442\u0440\u0438\u0435\u0448 \u043D\u0430\u043F\u044A\u043B\u043D\u043E \u043F\u0440\u0435\u0437 \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438, \u041E\u043F\u0430\u0441\u043D\u0430 \u0437\u043E\u043D\u0430.","\u0418\u043C\u0435\u0439\u043B\u0430 \u0438 \u043F\u0430\u0440\u043E\u043B\u0430\u0442\u0430 \u0441\u0438 \u0441\u043C\u0435\u043D\u044F\u0448 \u043F\u0440\u0435\u0437 \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438, \u041C\u043E\u044F\u0442 \u043F\u0440\u043E\u0444\u0438\u043B.","\u0418\u043C\u0430\u0448 \u0432\u044A\u043F\u0440\u043E\u0441 \u0437\u0430 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0441\u0438? \u041F\u0438\u0448\u0438 \u043D\u0430 \u0430\u0434\u0440\u0435\u0441\u0430 \u0432 \u043A\u0440\u0430\u044F \u043D\u0430 \u0442\u043E\u0437\u0438 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442."]],["8. \u0421\u0438\u0433\u0443\u0440\u043D\u043E\u0441\u0442",["\u0412\u0440\u044A\u0437\u043A\u0438\u0442\u0435 \u0441\u0430 \u043A\u0440\u0438\u043F\u0442\u0438\u0440\u0430\u043D\u0438 (https). \u041F\u0430\u0440\u043E\u043B\u0438\u0442\u0435 \u0441\u0435 \u043F\u0430\u0437\u044F\u0442 \u043A\u0440\u0438\u043F\u0442\u0438\u0440\u0430\u043D\u0438 \u0438 \u043D\u0435 \u043C\u043E\u0433\u0430\u0442 \u0434\u0430 \u0431\u044A\u0434\u0430\u0442 \u043F\u0440\u043E\u0447\u0435\u0442\u0435\u043D\u0438 \u043E\u0431\u0440\u0430\u0442\u043D\u043E.","\u0414\u043E\u0441\u0442\u044A\u043F\u044A\u0442 \u0434\u043E \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438 \u0435 \u0442\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D \u0434\u043E \u0441\u043E\u0431\u0441\u0442\u0432\u0435\u043D\u0438\u044F \u0442\u0438 \u043F\u0440\u043E\u0444\u0438\u043B.","\u041D\u0438\u043A\u043E\u044F \u0441\u0438\u0441\u0442\u0435\u043C\u0430 \u043D\u0435 \u0435 \u043D\u0430\u043F\u044A\u043B\u043D\u043E \u0431\u0435\u0437\u0433\u0440\u0435\u0448\u043D\u0430. \u0418\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u0439 \u0443\u043D\u0438\u043A\u0430\u043B\u043D\u0430 \u043F\u0430\u0440\u043E\u043B\u0430, \u043A\u043E\u044F\u0442\u043E \u043D\u0435 \u043F\u043E\u043B\u0437\u0432\u0430\u0448 \u043D\u0438\u043A\u044A\u0434\u0435 \u0434\u0440\u0443\u0433\u0430\u0434\u0435."]],["9. \u0414\u0435\u0446\u0430",["Mexo \u0435 \u043F\u0440\u0435\u0434\u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D\u043E \u0437\u0430 \u0445\u043E\u0440\u0430, \u043A\u043E\u0438\u0442\u043E \u0440\u0430\u0431\u043E\u0442\u044F\u0442. \u0410\u043A\u043E \u0441\u0438 \u043F\u043E\u0434 16 \u0433\u043E\u0434\u0438\u043D\u0438, \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u0439 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u0441 \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043D\u0438\u0435 \u043E\u0442 \u0440\u043E\u0434\u0438\u0442\u0435\u043B \u0438\u043B\u0438 \u043D\u0430\u0441\u0442\u043E\u0439\u043D\u0438\u043A."]],["10. \u0418\u0437\u0447\u0438\u0441\u043B\u0435\u043D\u0438\u044F\u0442\u0430 \u0441\u0430 \u043F\u0440\u043E\u0433\u043D\u043E\u0437\u0438",["\u0421\u0443\u043C\u0438\u0442\u0435 \u0432 Mexo \u0441\u0430 \u043F\u0440\u043E\u0433\u043D\u043E\u0437\u0438 \u0432\u044A\u0437 \u043E\u0441\u043D\u043E\u0432\u0430 \u043D\u0430 \u0442\u043E\u0432\u0430, \u043A\u043E\u0435\u0442\u043E \u0432\u044A\u0432\u0435\u0436\u0434\u0430\u0448. \u0422\u0435 \u043D\u0435 \u043E\u0442\u0447\u0438\u0442\u0430\u0442 \u0434\u0430\u043D\u044A\u0446\u0438, \u043E\u0441\u0438\u0433\u0443\u0440\u043E\u0432\u043A\u0438 \u0438 \u0443\u0434\u0440\u044A\u0436\u043A\u0438. \u0424\u0438\u0448\u044A\u0442 \u043E\u0442 \u0440\u0430\u0431\u043E\u0442\u043E\u0434\u0430\u0442\u0435\u043B\u044F \u0442\u0438 \u0432\u0438\u043D\u0430\u0433\u0438 \u0435 \u0432\u043E\u0434\u0435\u0449."]],["11. \u041F\u0440\u043E\u043C\u0435\u043D\u0438",["\u0410\u043A\u043E \u043D\u0435\u0449\u043E \u0432 \u0442\u043E\u0437\u0438 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442 \u0441\u0435 \u043F\u0440\u043E\u043C\u0435\u043D\u0438, \u0449\u0435 \u0431\u044A\u0434\u0435 \u0441\u044A\u043E\u0431\u0449\u0435\u043D\u043E \u0432 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E. \u0414\u0430\u0442\u0430\u0442\u0430 \u043D\u0430\u0439-\u0434\u043E\u043B\u0443 \u043F\u043E\u043A\u0430\u0437\u0432\u0430 \u043A\u043E\u0433\u0430 \u0442\u0435\u043A\u0441\u0442\u044A\u0442 \u0435 \u043E\u0431\u043D\u043E\u0432\u0435\u043D \u0437\u0430 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u043E."]],["12. \u041A\u043E\u043D\u0442\u0430\u043A\u0442",["\u0412\u044A\u043F\u0440\u043E\u0441\u0438 \u0437\u0430 \u043F\u043E\u0432\u0435\u0440\u0438\u0442\u0435\u043B\u043D\u043E\u0441\u0442\u0442\u0430 \u0438\u043B\u0438 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438? \u041F\u0438\u0448\u0438 \u043D\u0430 support.tspcode@gmail.com."]]]},Ik={en:[["1. About these terms",["These terms apply to the use of the Mexo app. By installing or using Mexo you agree to them. If you disagree, do not use the app."]],["2. The app",["Mexo is a tool with which you keep track of your own worked shifts, hours and schedule and calculate an estimate of your gross pay. Mexo is not payroll administration, not accounting software and not financial or legal advice.","Mexo is independent of your employer. The app is not connected to, and is not endorsed by, any employer, supermarket, carrier or other organisation."]],["3. Calculations are an estimate",["All amounts in the app are indicative and based on the data and settings you enter yourself (hourly rate, supplements, periods and so on).","No rights can be derived from the results. Where they differ, your official payslip or your employer's statement is always leading. So check important amounts yourself."]],["4. Your account",["Mexo can be used with an account or as a limited demo version without one. An account requires a valid email address.","You are responsible for keeping your password secret. Share your login details with nobody and use a password you use nowhere else.","Suspect that someone else can reach your account? Change your password immediately through Settings, My profile.","You may delete your account at any time through Settings, Danger zone. Your data is then permanently erased.","Accounts that are misused or used for unlawful purposes may be blocked or removed."]],["5. Synchronisation",["With an account your data is stored on a server and synchronised between your devices. That requires an internet connection; without one the app carries on with the data on your device.","If you change something on two devices at once while offline, two versions can arise. Mexo then lets you choose which version to keep; the other is overwritten.","We do our best to keep the service available but cannot guarantee uninterrupted availability. So make a backup regularly through Settings, Backup."]],["6. Your responsibility",["You are responsible for the accuracy of what you enter and for making backups of your data (Settings, Backup).","You will not use the app for unlawful purposes and will not try to misuse, copy or disrupt it."]],["7. Availability and changes",["Mexo is offered as it is, without any guarantee of uninterrupted availability or flawless operation.","Features may be added, changed or removed. The app may also be discontinued; so back up your data regularly."]],["8. Liability",["As far as the law allows, the maker of Mexo is not liable for damage arising from use of the app, including loss of data, missed income or decisions you take based on the amounts shown.","Nothing in these terms limits liability that cannot be excluded under mandatory law."]],["9. Intellectual property",["The name Mexo, the logo, the design and the software belong to the maker. The data you enter remains yours."]],["10. Changes to these terms",["These terms may be amended. The current version is always in the app. If you continue using Mexo after a change, the new version applies."]],["11. Applicable law",["Dutch law applies to these terms."]],["12. Contact",["Questions about these terms? Email support.tspcode@gmail.com."]]],pl:[["1. O tym regulaminie",["Ten regulamin dotyczy korzystania z aplikacji Mexo. Instaluj\u0105c lub u\u017Cywaj\u0105c Mexo, akceptujesz go. Je\u015Bli si\u0119 nie zgadzasz, nie korzystaj z aplikacji."]],["2. Aplikacja",["Mexo to narz\u0119dzie, w kt\xF3rym samodzielnie prowadzisz ewidencj\u0119 przepracowanych zmian, godzin i grafiku oraz obliczasz szacunkow\u0105 wyp\u0142at\u0119 brutto. Mexo nie jest systemem kadrowo-p\u0142acowym, programem ksi\u0119gowym ani doradztwem finansowym lub prawnym.","Mexo jest niezale\u017Cne od Twojego pracodawcy. Aplikacja nie jest powi\u0105zana ani wspierana przez \u017Cadnego pracodawc\u0119, supermarket, przewo\u017Anika czy inn\u0105 organizacj\u0119."]],["3. Obliczenia s\u0105 szacunkiem",["Wszystkie kwoty w aplikacji maj\u0105 charakter orientacyjny i opieraj\u0105 si\u0119 na danych oraz ustawieniach, kt\xF3re sam wprowadzasz (stawka godzinowa, dodatki, okresy i tak dalej).","Z wynik\xF3w nie wynikaj\u0105 \u017Cadne prawa. W razie r\xF3\u017Cnicy decyduj\u0105cy jest oficjalny pasek wyp\u0142aty lub informacja od pracodawcy. Wa\u017Cne kwoty sprawdzaj wi\u0119c samodzielnie."]],["4. Twoje konto",["Z Mexo mo\u017Cesz korzysta\u0107 z kontem lub jako ograniczona wersja demo bez konta. Konto wymaga wa\u017Cnego adresu e-mail.","Odpowiadasz za zachowanie has\u0142a w tajemnicy. Nie udost\u0119pniaj nikomu danych logowania i u\u017Cywaj has\u0142a, kt\xF3rego nie stosujesz nigdzie indziej.","Podejrzewasz, \u017Ce kto\u015B inny ma dost\u0119p do Twojego konta? Natychmiast zmie\u0144 has\u0142o w Ustawieniach, w Moim profilu.","Konto mo\u017Cesz usun\u0105\u0107 w ka\u017Cdej chwili w Ustawieniach, w strefie zagro\u017Cenia. Dane zostan\u0105 wtedy trwale skasowane.","Konta wykorzystywane niezgodnie z przeznaczeniem lub do cel\xF3w bezprawnych mog\u0105 zosta\u0107 zablokowane albo usuni\u0119te."]],["5. Synchronizacja",["Z kontem dane s\u0105 przechowywane na serwerze i synchronizowane mi\u0119dzy urz\u0105dzeniami. Potrzebne jest do tego po\u0142\u0105czenie z internetem; bez niego aplikacja dzia\u0142a dalej na danych z urz\u0105dzenia.","Je\u015Bli offline zmienisz co\u015B na dw\xF3ch urz\u0105dzeniach naraz, mog\u0105 powsta\u0107 dwie wersje. Mexo pozwoli Ci wtedy wybra\u0107, kt\xF3r\u0105 zachowa\u0107; druga zostanie nadpisana.","Staramy si\u0119 utrzyma\u0107 us\u0142ug\u0119 dost\u0119pn\u0105, ale nie gwarantujemy nieprzerwanej dost\u0119pno\u015Bci. Regularnie r\xF3b kopi\u0119 zapasow\u0105 w Ustawieniach."]],["6. Twoja odpowiedzialno\u015B\u0107",["Odpowiadasz za poprawno\u015B\u0107 tego, co wprowadzasz, oraz za tworzenie kopii zapasowych swoich danych (Ustawienia, Kopia zapasowa).","Nie u\u017Cywasz aplikacji do cel\xF3w bezprawnych i nie pr\xF3bujesz jej nadu\u017Cywa\u0107, kopiowa\u0107 ani zak\u0142\xF3ca\u0107."]],["7. Dost\u0119pno\u015B\u0107 i zmiany",["Mexo jest udost\u0119pniane w takiej postaci, w jakiej jest, bez gwarancji nieprzerwanej dost\u0119pno\u015Bci czy bezb\u0142\u0119dnego dzia\u0142ania.","Funkcje mog\u0105 by\u0107 dodawane, zmieniane lub usuwane. Aplikacja mo\u017Ce te\u017C zosta\u0107 wycofana; dlatego regularnie r\xF3b kopi\u0119 zapasow\u0105."]],["8. Odpowiedzialno\u015B\u0107",["W zakresie dozwolonym przez prawo tw\xF3rca Mexo nie odpowiada za szkody wynikaj\u0105ce z korzystania z aplikacji, w tym utrat\u0119 danych, utracone dochody czy decyzje podj\u0119te na podstawie wy\u015Bwietlanych kwot.","Nic w tym regulaminie nie ogranicza odpowiedzialno\u015Bci, kt\xF3rej nie mo\u017Cna wy\u0142\u0105czy\u0107 na mocy bezwzgl\u0119dnie obowi\u0105zuj\u0105cych przepis\xF3w."]],["9. W\u0142asno\u015B\u0107 intelektualna",["Nazwa Mexo, logo, projekt i oprogramowanie nale\u017C\u0105 do tw\xF3rcy. Dane, kt\xF3re wprowadzasz, pozostaj\u0105 Twoje."]],["10. Zmiany regulaminu",["Regulamin mo\u017Ce by\u0107 zmieniany. Aktualna wersja jest zawsze w aplikacji. Je\u015Bli po zmianie nadal korzystasz z Mexo, obowi\u0105zuje nowa wersja."]],["11. Prawo w\u0142a\u015Bciwe",["Do niniejszego regulaminu stosuje si\u0119 prawo niderlandzkie."]],["12. Kontakt",["Pytania o regulamin? Napisz na support.tspcode@gmail.com."]]],bg:[["1. \u0417\u0430 \u0442\u0435\u0437\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u044F",["\u0422\u0435\u0437\u0438 \u043E\u0431\u0449\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u044F \u0432\u0430\u0436\u0430\u0442 \u0437\u0430 \u043F\u043E\u043B\u0437\u0432\u0430\u043D\u0435\u0442\u043E \u043D\u0430 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E Mexo. \u0421 \u0438\u043D\u0441\u0442\u0430\u043B\u0438\u0440\u0430\u043D\u0435\u0442\u043E \u0438\u043B\u0438 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u043D\u0435\u0442\u043E \u043D\u0430 Mexo \u0433\u0438 \u043F\u0440\u0438\u0435\u043C\u0430\u0448. \u0410\u043A\u043E \u043D\u0435 \u0441\u0438 \u0441\u044A\u0433\u043B\u0430\u0441\u0435\u043D, \u043D\u0435 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u0439 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E."]],["2. \u041F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E",["Mexo \u0435 \u043F\u043E\u043C\u043E\u0449\u043D\u043E \u0441\u0440\u0435\u0434\u0441\u0442\u0432\u043E, \u0441 \u043A\u043E\u0435\u0442\u043E \u0441\u0430\u043C \u0441\u043B\u0435\u0434\u0438\u0448 \u043E\u0442\u0440\u0430\u0431\u043E\u0442\u0435\u043D\u0438\u0442\u0435 \u0441\u0438 \u0441\u043C\u0435\u043D\u0438, \u0447\u0430\u0441\u043E\u0432\u0435 \u0438 \u0433\u0440\u0430\u0444\u0438\u043A \u0438 \u0438\u0437\u0447\u0438\u0441\u043B\u044F\u0432\u0430\u0448 \u043F\u0440\u043E\u0433\u043D\u043E\u0437\u043D\u0430 \u0431\u0440\u0443\u0442\u043D\u0430 \u0437\u0430\u043F\u043B\u0430\u0442\u0430. Mexo \u043D\u0435 \u0435 \u0441\u0438\u0441\u0442\u0435\u043C\u0430 \u0437\u0430 \u0437\u0430\u043F\u043B\u0430\u0442\u0438, \u043D\u0435 \u0435 \u0441\u0447\u0435\u0442\u043E\u0432\u043E\u0434\u043D\u0430 \u043F\u0440\u043E\u0433\u0440\u0430\u043C\u0430 \u0438 \u043D\u0435 \u0435 \u0444\u0438\u043D\u0430\u043D\u0441\u043E\u0432 \u0438\u043B\u0438 \u043F\u0440\u0430\u0432\u0435\u043D \u0441\u044A\u0432\u0435\u0442.","Mexo \u0435 \u043D\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043C\u043E \u043E\u0442 \u0440\u0430\u0431\u043E\u0442\u043E\u0434\u0430\u0442\u0435\u043B\u044F \u0442\u0438. \u041F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u043D\u0435 \u0435 \u0441\u0432\u044A\u0440\u0437\u0430\u043D\u043E \u0441 \u0438 \u043D\u0435 \u0441\u0435 \u043F\u043E\u0434\u043A\u0440\u0435\u043F\u044F \u043E\u0442 \u043A\u0430\u043A\u044A\u0432\u0442\u043E \u0438 \u0434\u0430 \u0435 \u0440\u0430\u0431\u043E\u0442\u043E\u0434\u0430\u0442\u0435\u043B, \u0441\u0443\u043F\u0435\u0440\u043C\u0430\u0440\u043A\u0435\u0442, \u043F\u0440\u0435\u0432\u043E\u0437\u0432\u0430\u0447 \u0438\u043B\u0438 \u0434\u0440\u0443\u0433\u0430 \u043E\u0440\u0433\u0430\u043D\u0438\u0437\u0430\u0446\u0438\u044F."]],["3. \u0418\u0437\u0447\u0438\u0441\u043B\u0435\u043D\u0438\u044F\u0442\u0430 \u0441\u0430 \u043F\u0440\u043E\u0433\u043D\u043E\u0437\u0430",["\u0412\u0441\u0438\u0447\u043A\u0438 \u0441\u0443\u043C\u0438 \u0432 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u0441\u0430 \u043E\u0440\u0438\u0435\u043D\u0442\u0438\u0440\u043E\u0432\u044A\u0447\u043D\u0438 \u0438 \u0441\u0435 \u043E\u0441\u043D\u043E\u0432\u0430\u0432\u0430\u0442 \u043D\u0430 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0438 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438\u0442\u0435, \u043A\u043E\u0438\u0442\u043E \u0441\u0430\u043C \u0432\u044A\u0432\u0435\u0436\u0434\u0430\u0448 (\u0447\u0430\u0441\u043E\u0432\u0430 \u0441\u0442\u0430\u0432\u043A\u0430, \u0434\u043E\u0431\u0430\u0432\u043A\u0438, \u043F\u0435\u0440\u0438\u043E\u0434\u0438 \u0438 \u043F\u043E\u0434\u043E\u0431\u043D\u0438).","\u041E\u0442 \u0440\u0435\u0437\u0443\u043B\u0442\u0430\u0442\u0438\u0442\u0435 \u043D\u0435 \u043F\u0440\u043E\u0438\u0437\u0442\u0438\u0447\u0430\u0442 \u043F\u0440\u0430\u0432\u0430. \u041F\u0440\u0438 \u0440\u0430\u0437\u043B\u0438\u043A\u0430 \u0432\u0438\u043D\u0430\u0433\u0438 \u0435 \u0432\u043E\u0434\u0435\u0449 \u043E\u0444\u0438\u0446\u0438\u0430\u043B\u043D\u0438\u044F\u0442 \u0442\u0438 \u0444\u0438\u0448 \u0438\u043B\u0438 \u0441\u043F\u0440\u0430\u0432\u043A\u0430\u0442\u0430 \u043E\u0442 \u0440\u0430\u0431\u043E\u0442\u043E\u0434\u0430\u0442\u0435\u043B\u044F. \u0417\u0430\u0442\u043E\u0432\u0430 \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0432\u0430\u0439 \u0432\u0430\u0436\u043D\u0438\u0442\u0435 \u0441\u0443\u043C\u0438 \u0441\u0430\u043C."]],["4. \u0422\u0432\u043E\u044F\u0442 \u043F\u0440\u043E\u0444\u0438\u043B",["Mexo \u043C\u043E\u0436\u0435 \u0434\u0430 \u0441\u0435 \u043F\u043E\u043B\u0437\u0432\u0430 \u0441 \u043F\u0440\u043E\u0444\u0438\u043B \u0438\u043B\u0438 \u043A\u0430\u0442\u043E \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D\u0430 \u0434\u0435\u043C\u043E \u0432\u0435\u0440\u0441\u0438\u044F \u0431\u0435\u0437 \u043F\u0440\u043E\u0444\u0438\u043B. \u0417\u0430 \u043F\u0440\u043E\u0444\u0438\u043B \u0435 \u043D\u0443\u0436\u0435\u043D \u0432\u0430\u043B\u0438\u0434\u0435\u043D \u0438\u043C\u0435\u0439\u043B \u0430\u0434\u0440\u0435\u0441.","\u0422\u0438 \u043E\u0442\u0433\u043E\u0432\u0430\u0440\u044F\u0448 \u0437\u0430 \u043F\u0430\u0437\u0435\u043D\u0435\u0442\u043E \u043D\u0430 \u043F\u0430\u0440\u043E\u043B\u0430\u0442\u0430 \u0441\u0438 \u0432 \u0442\u0430\u0439\u043D\u0430. \u041D\u0435 \u0441\u043F\u043E\u0434\u0435\u043B\u044F\u0439 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0441\u0438 \u0437\u0430 \u0432\u0445\u043E\u0434 \u0441 \u043D\u0438\u043A\u043E\u0433\u043E \u0438 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u0439 \u043F\u0430\u0440\u043E\u043B\u0430, \u043A\u043E\u044F\u0442\u043E \u043D\u0435 \u043F\u043E\u043B\u0437\u0432\u0430\u0448 \u043D\u0438\u043A\u044A\u0434\u0435 \u0434\u0440\u0443\u0433\u0430\u0434\u0435.","\u041F\u043E\u0434\u043E\u0437\u0438\u0440\u0430\u0448, \u0447\u0435 \u043D\u044F\u043A\u043E\u0439 \u0434\u0440\u0443\u0433 \u0438\u043C\u0430 \u0434\u043E\u0441\u0442\u044A\u043F \u0434\u043E \u043F\u0440\u043E\u0444\u0438\u043B\u0430 \u0442\u0438? \u0421\u043C\u0435\u043D\u0438 \u043F\u0430\u0440\u043E\u043B\u0430\u0442\u0430 \u0432\u0435\u0434\u043D\u0430\u0433\u0430 \u043F\u0440\u0435\u0437 \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438, \u041C\u043E\u044F\u0442 \u043F\u0440\u043E\u0444\u0438\u043B.","\u041C\u043E\u0436\u0435\u0448 \u0434\u0430 \u0438\u0437\u0442\u0440\u0438\u0435\u0448 \u043F\u0440\u043E\u0444\u0438\u043B\u0430 \u0441\u0438 \u043F\u043E \u0432\u0441\u044F\u043A\u043E \u0432\u0440\u0435\u043C\u0435 \u043F\u0440\u0435\u0437 \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438, \u041E\u043F\u0430\u0441\u043D\u0430 \u0437\u043E\u043D\u0430. \u0414\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438 \u0442\u043E\u0433\u0430\u0432\u0430 \u0441\u0435 \u0437\u0430\u043B\u0438\u0447\u0430\u0432\u0430\u0442 \u043E\u043A\u043E\u043D\u0447\u0430\u0442\u0435\u043B\u043D\u043E.","\u041F\u0440\u043E\u0444\u0438\u043B\u0438, \u043A\u043E\u0438\u0442\u043E \u0441\u0435 \u0438\u0437\u043F\u043E\u043B\u0437\u0432\u0430\u0442 \u043D\u0435\u043F\u0440\u0430\u0432\u043E\u043C\u0435\u0440\u043D\u043E \u0438\u043B\u0438 \u0437\u0430 \u043D\u0435\u0437\u0430\u043A\u043E\u043D\u043D\u0438 \u0446\u0435\u043B\u0438, \u043C\u043E\u0433\u0430\u0442 \u0434\u0430 \u0431\u044A\u0434\u0430\u0442 \u0431\u043B\u043E\u043A\u0438\u0440\u0430\u043D\u0438 \u0438\u043B\u0438 \u043F\u0440\u0435\u043C\u0430\u0445\u043D\u0430\u0442\u0438."]],["5. \u0421\u0438\u043D\u0445\u0440\u043E\u043D\u0438\u0437\u0430\u0446\u0438\u044F",["\u0421 \u043F\u0440\u043E\u0444\u0438\u043B \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u0442\u0438 \u0441\u0435 \u0441\u044A\u0445\u0440\u0430\u043D\u044F\u0432\u0430\u0442 \u043D\u0430 \u0441\u044A\u0440\u0432\u044A\u0440 \u0438 \u0441\u0435 \u0441\u0438\u043D\u0445\u0440\u043E\u043D\u0438\u0437\u0438\u0440\u0430\u0442 \u043C\u0435\u0436\u0434\u0443 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430\u0442\u0430 \u0442\u0438. \u0417\u0430 \u0442\u043E\u0432\u0430 \u0435 \u043D\u0443\u0436\u043D\u0430 \u0438\u043D\u0442\u0435\u0440\u043D\u0435\u0442 \u0432\u0440\u044A\u0437\u043A\u0430; \u0431\u0435\u0437 \u043D\u0435\u044F \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435\u0442\u043E \u043F\u0440\u043E\u0434\u044A\u043B\u0436\u0430\u0432\u0430 \u0441 \u0434\u0430\u043D\u043D\u0438\u0442\u0435 \u043D\u0430 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E\u0442\u043E \u0442\u0438.","\u0410\u043A\u043E \u043E\u0444\u043B\u0430\u0439\u043D \u043F\u0440\u043E\u043C\u0435\u043D\u0438\u0448 \u043D\u0435\u0449\u043E \u043D\u0430 \u0434\u0432\u0435 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430 \u0435\u0434\u043D\u043E\u0432\u0440\u0435\u043C\u0435\u043D\u043D\u043E, \u043C\u043E\u0433\u0430\u0442 \u0434\u0430 \u0432\u044A\u0437\u043D\u0438\u043A\u043D\u0430\u0442 \u0434\u0432\u0435 \u0432\u0435\u0440\u0441\u0438\u0438. \u0422\u043E\u0433\u0430\u0432\u0430 Mexo \u0442\u0435 \u043E\u0441\u0442\u0430\u0432\u044F \u0434\u0430 \u0438\u0437\u0431\u0435\u0440\u0435\u0448 \u043A\u043E\u044F \u0434\u0430 \u0441\u0435 \u0437\u0430\u043F\u0430\u0437\u0438; \u0434\u0440\u0443\u0433\u0430\u0442\u0430 \u0441\u0435 \u043F\u0440\u0435\u0437\u0430\u043F\u0438\u0441\u0432\u0430.","\u041F\u043E\u043B\u0430\u0433\u0430\u043C\u0435 \u0443\u0441\u0438\u043B\u0438\u044F \u0443\u0441\u043B\u0443\u0433\u0430\u0442\u0430 \u0434\u0430 \u0435 \u0434\u043E\u0441\u0442\u044A\u043F\u043D\u0430, \u043D\u043E \u043D\u0435 \u043C\u043E\u0436\u0435\u043C \u0434\u0430 \u0433\u0430\u0440\u0430\u043D\u0442\u0438\u0440\u0430\u043C\u0435 \u043D\u0435\u043F\u0440\u0435\u043A\u044A\u0441\u043D\u0430\u0442\u0430 \u0434\u043E\u0441\u0442\u044A\u043F\u043D\u043E\u0441\u0442. \u0417\u0430\u0442\u043E\u0432\u0430 \u043F\u0440\u0430\u0432\u0438 \u0440\u0435\u0434\u043E\u0432\u043D\u043E \u0440\u0435\u0437\u0435\u0440\u0432\u043D\u043E \u043A\u043E\u043F\u0438\u0435 \u043F\u0440\u0435\u0437 \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438."]],["6. \u0422\u0432\u043E\u044F\u0442\u0430 \u043E\u0442\u0433\u043E\u0432\u043E\u0440\u043D\u043E\u0441\u0442",["\u0422\u0438 \u043E\u0442\u0433\u043E\u0432\u0430\u0440\u044F\u0448 \u0437\u0430 \u0432\u0435\u044
