 De app kan ook worden stopgezet; maak daarom regelmatig een back-up van je gegevens."]],["6. Aansprakelijkheid",["Voor zover wettelijk toegestaan is de maker van Mexo niet aansprakelijk voor schade die voortvloeit uit het gebruik van de app, waaronder verlies van gegevens, gemiste inkomsten of beslissingen die je op basis van de getoonde bedragen neemt.","Niets in deze voorwaarden beperkt aansprakelijkheid die op grond van dwingend recht niet kan worden uitgesloten."]],["7. Intellectueel eigendom",["De naam Mexo, het logo, het ontwerp en de programmatuur zijn eigendom van de maker. De gegevens die jij invoert blijven van jou."]],["8. Wijziging van deze voorwaarden",["Deze voorwaarden kunnen worden aangepast. De actuele versie staat altijd in de app. Blijf je Mexo gebruiken na een wijziging, dan geldt de nieuwe versie."]],["9. Toepasselijk recht",["Op deze voorwaarden is Nederlands recht van toepassing."]],["10. Contact",["Vragen over deze voorwaarden? Neem contact op via de contactgegevens bij de app-vermelding in de store."]]],ab=[["Kort samengevat",["Mexo verzamelt geen gegevens over jou. Alles wat je invoert blijft op je eigen toestel staan. Er is geen server, geen account in de cloud, geen tracking en geen advertenties."]],["1. Welke gegevens slaat de app op?",["Op je toestel worden opgeslagen: je profielnaam, een eventuele profielfoto, een versleutelde (gehashte) pincode, je ingevoerde diensten en werkschema, je baan-profielen en je instellingen zoals loon, toeslagen en thema.","Deze gegevens staan in de lokale opslag van de app of browser op je toestel en worden nergens naartoe verzonden."]],["2. Wat gebeurt er niet?",["Er worden geen gegevens naar een server van de maker of naar derden gestuurd. Er wordt geen gebruik gemaakt van analytics, advertenties, profilering of locatiebepaling. Er worden geen gegevens verkocht of gedeeld."]],["3. Profielfoto",["Kies je een profielfoto, dan wordt die verkleind en alleen op je eigen toestel bewaard. De app krijgt geen toegang tot je overige foto's en uploadt niets."]],["4. Meldingen",["Als je meldingen toestaat, worden die lokaal door je toestel gemaakt wanneer je de app opent. Er is geen pushserver en er wordt geen apparaat-identificatie verstuurd."]],["5. Back-ups die je zelf maakt",["Met de exportfunctie maak je zelf een bestand met je gegevens. Waar je dat bestand bewaart of naartoe stuurt, bepaal jij; daar heeft de maker van Mexo geen inzage in of controle over."]],["6. Bewaren en verwijderen",["Je gegevens blijven staan tot je ze zelf verwijdert. Dat kan via Instellingen \u2192 Backup & wissen, of door de app te verwijderen of de app-/browsergegevens te wissen. Daarmee zijn ze definitief weg; er bestaat geen kopie elders."]],["7. Jouw rechten",["Omdat er geen persoonsgegevens door de maker worden verwerkt of bewaard, is er niets om bij ons in te zien, te corrigeren of te laten verwijderen. Je hebt zelf volledige controle over alle gegevens in de app."]],["8. Kinderen",["Mexo is bedoeld voor gebruikers die werken. De app is niet gericht op kinderen en verzamelt sowieso geen gegevens."]],["9. Wijzigingen",["Deze privacyverklaring kan worden aangepast. De actuele versie staat altijd in de app."]],["10. Contact",["Vragen over privacy? Neem contact op via de contactgegevens bij de app-vermelding in de store."]]];function Ii(e){return{id:Date.now()+Math.floor(Math.random()*1e5),naam:e||"Mijn baan",functies:[],extraTaken:[],dagdelen:!0}}var aa={loonModus:"apart",uurloon:11.79,allInUurloon:14,vastLoon:2200,vasteUren:160,vakantiegeldPct:8,vakantiegeldMaand:5,rooster:[{actief:!1,start:"09:00",eind:"17:00"},{actief:!0,start:"09:00",eind:"17:00"},{actief:!0,start:"09:00",eind:"17:00"},{actief:!0,start:"09:00",eind:"17:00"},{actief:!0,start:"09:00",eind:"17:00"},{actief:!0,start:"09:00",eind:"17:00"},{actief:!1,start:"09:00",eind:"17:00"}],atvPct:7.58,vakRechtPct:9.45,vakToeslagPct:8,zondagPct:50,feestdagPct:100,avondPct:50,avondActief:!0,avondVanaf:"22:00",ortActief:!1,ortModus:"simpel"
