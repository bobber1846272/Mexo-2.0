<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Mexo — Shift & Loon Tracker</title>
<meta name="description" content="Houd je shifts, uren en loon bij. Werkschema, payday-countdown en toeslagen.">
<meta name="theme-color" content="#0F1613">

<!-- ─────────────────────────────────────────────────────────────
     Beveiliging: de app mag alleen praten met zichzelf en met
     Supabase. Wordt er ooit vreemde code binnengesmokkeld, dan
     kan die geen gegevens naar buiten sturen.
     Pas connect-src aan als je van cloudleverancier wisselt.
     ───────────────────────────────────────────────────────────── -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  font-src 'self';
  connect-src 'self' https://*.supabase.co;
  form-action 'none';
  frame-ancestors 'none';
  base-uri 'self';
  object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mexo">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  html,body{margin:0;padding:0;height:100%;background:#0F1613;overscroll-behavior:none}
  #root{height:100%}
  @supports not (height:100dvh){#root>div{height:100vh!important;max-height:100vh!important}}
  #root{min-height:100vh}
  #fout{display:none;font-family:monospace;background:#0F1613;color:#fff;padding:16px;font-size:12px;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<noscript><div style="padding:20px;font-family:sans-serif;font-weight:bold;color:#fff">Zet JavaScript aan om Mexo te gebruiken.</div></noscript>
<div id="fout"></div>
<div id="root"></div>
<!-- Jouw eigen instellingen; dit bestand hoef je nooit te vervangen -->
<script>window.MEXO_CLOUD = { url: "", key: "" };</script>
<script src="config.js"></script>
</script>
</script>
</script>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('fout');
  if (el) { el.style.display = 'block';
  el.textContent = 'Er ging iets mis bij het laden:\n' + msg + (err && err.stack ? '\n\n' + err.stack : ''); }
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) { console.log('SW registratie mislukt:', e); });
  });
}
</script>

on:"\u{1F4E3}",label:"Meldingen versturen",alleenBeheer:!0},{key:"inbox",icoon:"\u{1F4E5}",label:"Feedback-inbox",alleenBeheer:!0},{key:"cijfers",icoon:"\u{1F4C8}",label:"Cijfers",alleenBeheer:!0},{key:"beheerders",icoon:"\u{1F451}",label:"Beheerders",alleenBeheer:!0},{key:"onderhoud",icoon:"\u{1F6A7}",label:"Onderhoudsmodus",alleenBeheer:!0}]},{titel:"Gevarenzone",items:[{key:"gevaar",icoon:"\u26A0\uFE0F",label:"Account verwijderen"}]}],Ek="juli 2026",Bk=[["1. Over deze voorwaarden",["Deze algemene voorwaarden gelden voor het gebruik van de app Mexo. Door Mexo te installeren of te gebruiken ga je akkoord met deze voorwaarden. Ben je het er niet mee eens, gebruik de app dan niet."]],["2. De app",["Mexo is een hulpmiddel waarmee je zelf je gewerkte diensten, uren en werkschema bijhoudt en een schatting van je brutoloon berekent. Mexo is geen loonadministratie, geen boekhoudprogramma en geen financieel of juridisch advies.","Mexo staat los van je werkgever. De app is niet verbonden aan, en wordt niet ondersteund door, welke werkgever, supermarkt, vervoerder of andere organisatie dan ook."]],["3. Berekeningen zijn een schatting",["Alle bedragen in de app zijn indicatief en gebaseerd op de gegevens en instellingen die jij zelf invoert (uurloon, toeslagen, periodes en dergelijke).","Je kunt aan de uitkomsten geen rechten ontlenen. Bij verschil is altijd je offici\xEBle loonstrook of de opgave van je werkgever leidend. Controleer belangrijke bedragen dus zelf."]],["4. Je account",["Mexo is te gebruiken met een account of als beperkte demoversie zonder account. Voor een account heb je een geldig e-mailadres nodig.","Je bent zelf verantwoordelijk voor het geheimhouden van je wachtwoord. Deel je inloggegevens met niemand en gebruik een wachtwoord dat je nergens anders gebruikt.","Vermoed je dat iemand anders bij je account kan? Wijzig dan direct je wachtwoord via Instellingen \u2192 Mijn profiel.","Je mag je account op elk moment verwijderen via Instellingen \u2192 Gevarenzone. Je gegevens worden dan definitief gewist.","Accounts die worden misbruikt of gebruikt voor onrechtmatige doeleinden kunnen worden geblokkeerd of verwijderd."]],["5. Synchronisatie",["Met een account worden je gegevens opgeslagen op een server en gesynchroniseerd tussen je apparaten. Daarvoor is een internetverbinding nodig; zonder verbinding werkt de app door met de gegevens op je toestel.","Pas je op twee apparaten tegelijk iets aan zonder verbinding, dan kunnen er twee versies ontstaan. Mexo laat je in dat geval kiezen welke versie behouden blijft; de andere wordt overschreven.","We doen ons best de dienst beschikbaar te houden, maar kunnen geen ononderbroken beschikbaarheid garanderen. Maak daarom regelmatig een back-up via Instellingen \u2192 Backup."]],["6. Jouw verantwoordelijkheid",["Je bent zelf verantwoordelijk voor de juistheid van wat je invoert en voor het maken van back-ups van je gegevens (Instellingen \u2192 Backup).","Je gebruikt de app niet voor onrechtmatige doeleinden en probeert de app niet te misbruiken, na te maken of te verstoren."]],["7. Beschikbaarheid en wijzigingen",["Mexo wordt aangeboden zoals hij is, zonder garantie op ononderbroken beschikbaarheid of foutloze werking.","Functies kunnen worden toegevoegd, gewijzigd of verwijderd. De app kan ook worden stopgezet; maak daarom regelmatig een back-up van je gegevens."]],["8. Aansprakelijkheid",["Voor zover wettelijk toegestaan is de maker van Mexo niet aansprakelijk voor schade die voortvloeit uit het gebruik van de app, waaronder verlies van gegevens, gemiste inkomsten of beslissingen die je op basis van de getoonde bedragen neemt.","Niets in deze voorwaarden beperkt aansprakelijkheid die op grond van dwingend recht niet kan worden uitgesloten."]],["9. Intellectueel eigendom",["De naam Mexo, het logo, het ontwerp en de programmatuur zijn eigendom van de maker. De gegevens die jij invoert blijven van jou."]],["10. Wijziging van deze voorwaarden",["Deze voorwaarden kunnen worden aangepast. De actuele versie staat altijd in de app. Blijf je Mexo gebruiken na een wijziging, dan geldt de nieuwe versie."]],["11. Toepasselijk recht",["Op deze voorwaarden is Nederlands recht van toepassing."]],["12. Contact",["Vragen over deze voorwaarden? Neem contact op via de contactgegevens bij de app-vermelding in de store."]]],Ck=[["Kort samengevat",["Mexo verkoopt niets, volgt je niet en toont geen advertenties. Zonder account blijft alles op je eigen toestel. Kies je voor een account, dan worden je gegevens opgeslagen op een beveiligde server in Europa, zodat je ze op meerdere apparaten kunt gebruiken."]],["1. Twee manieren om Mexo te gebruiken",["Demoversie (zonder account): alles blijft in de opslag van je eigen toestel. Er wordt niets verzonden.","Met een account: je gegevens worden opgeslagen bij onze dienstverlener en gesynchroniseerd tussen je apparaten."]],["2. Welke gegevens worden opgeslagen?",["Accountgegevens: je e-mailadres en een versleutelde weergave van je wachtwoord. Je wachtwoord zelf is voor niemand leesbaar, ook niet voor ons.","Profielgegevens: je naam, een eventuele profielfoto en een versleutelde (gehashte) pincode.","Werkgegevens: je ingevoerde diensten, je werkschema, je baan-profielen en je instellingen zoals uurloon, toeslagen, taal en thema.","Meer wordt er niet opgeslagen. Er zijn geen trackers, geen advertentienetwerken en geen analysesoftware."]],["3. Waar staan je gegevens?",["Voor accounts en opslag gebruiken we Supabase. De gegevens staan op servers binnen de Europese Unie (Frankfurt, Duitsland).","De opslag is beveiligd met toegangsregels waardoor je uitsluitend bij je eigen gegevens kunt. Andere gebruikers kunnen jouw gegevens niet inzien.","Ook op je eigen toestel blijft een kopie staan, zodat de app werkt zonder internetverbinding."]],["4. Wat gebeurt er niet?",["Je gegevens worden niet verkocht, verhuurd of gedeeld met adverteerders.","Er wordt geen profiel van je opgebouwd voor reclamedoeleinden.","Je locatie, contacten, agenda en andere apps worden niet uitgelezen.","Mexo stuurt geen gegevens naar je werkgever."]],["5. Waarvoor gebruiken we je gegevens?",["Uitsluitend om de app te laten werken: je diensten bewaren, je loon berekenen en je gegevens tussen je apparaten synchroniseren.","Je e-mailadres wordt alleen gebruikt om in te loggen, om je wachtwoord te kunnen herstellen en om je te waarschuwen bij belangrijke wijzigingen aan je account.","Er worden geen reclamemails verstuurd."]],["6. Hoe lang bewaren we je gegevens?",["Zolang je account bestaat. Verwijder je je account in de app, dan worden je gegevens en je inlog direct van de server gewist.","Die verwijdering is definitief; er wordt geen kopie bewaard."]],["7. Je rechten",["Je kunt je gegevens op elk moment inzien in de app zelf, aanpassen, exporteren via de backupfunctie, en volledig verwijderen via Instellingen \u2192 Gevarenzone.","Je kunt je e-mailadres en wachtwoord wijzigen via Instellingen \u2192 Mijn profiel.","Heb je een vraag over je gegevens, neem dan contact op via het adres onderaan deze verklaring."]],["8. Beveiliging",["Verbindingen verlopen versleuteld (https). Wachtwoorden worden versleuteld opgeslagen en zijn niet terug te lezen.","Toegang tot je gegevens is technisch beperkt tot je eigen account.","Geen enkel systeem is volledig onfeilbaar. Gebruik daarom een uniek wachtwoord dat je nergens anders gebruikt."]],["9. Kinderen",["Mexo is bedoeld voor mensen die werken. Ben je jonger dan 16, gebruik de app dan met toestemming van een ouder of verzorger."]],["10. Berekeningen zijn schattingen",["De bedragen in Mexo zijn schattingen op basis van wat jij invult. Ze houden geen rekening met belastingen, premies en inhoudingen. Je loonstrook van je werkgever is altijd leidend."]],["11. Wijzigingen",["Verandert er iets aan deze verklaring, dan wordt dat in de app gemeld. De datum onderaan geeft aan wanneer de tekst voor het laatst is bijgewerkt."]],["12. Contact",["Vragen over je privacy of je gegevens? Neem contact o
